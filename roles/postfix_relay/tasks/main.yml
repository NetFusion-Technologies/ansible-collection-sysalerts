---
- name: Postfix relay | Announce compatibility role
  ansible.builtin.debug:
    msg: >-
      netfusion.sysalerts.postfix_relay is retained for compatibility.
      New playbooks should use netfusion.sysalerts.mail_transport.
    verbosity: 1

- name: Postfix relay | Run mail transport role
  ansible.builtin.include_role:
    name: netfusion.sysalerts.mail_transport
