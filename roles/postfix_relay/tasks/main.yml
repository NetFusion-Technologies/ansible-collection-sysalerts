- name: Skip explicitly excluded hosts
  ansible.builtin.meta: end_host
  when: inventory_hostname in sysalerts_skip_hosts

- name: Set OS-specific defaults for Debian
  ansible.builtin.set_fact:
    sysalerts_postfix_map_type: "{{ sysalerts_postfix_map_type | default('hash') }}"
    sysalerts_mail_client_package: "{{ sysalerts_mail_client_package | default('mailutils') }}"
    sysalerts_required_packages: "{{ sysalerts_required_packages_debian }}"
    sysalerts_tls_cafile: "{{ sysalerts_tls_cafile | default('/etc/ssl/certs/ca-certificates.crt') }}"
  when: ansible_facts["os_family"] == "Debian"

- name: Set OS-specific defaults for Archlinux
  ansible.builtin.set_fact:
    sysalerts_postfix_map_type: "{{ sysalerts_postfix_map_type | default('lmdb') }}"
    sysalerts_mail_client_package: "{{ sysalerts_mail_client_package | default('mailutils') }}"
    sysalerts_required_packages: "{{ sysalerts_required_packages_arch }}"
    sysalerts_tls_cafile: "{{ sysalerts_tls_cafile | default('/etc/ssl/certs/ca-certificates.crt') }}"
  when: ansible_facts["os_family"] == "Archlinux"

- name: Set OS-specific defaults for RedHat
  ansible.builtin.set_fact:
    sysalerts_postfix_map_type: "{{ sysalerts_postfix_map_type | default('hash') }}"
    sysalerts_mail_client_package: "{{ sysalerts_mail_client_package | default('s-nail') }}"
    sysalerts_required_packages: "{{ sysalerts_required_packages_redhat }}"
    sysalerts_tls_cafile: "{{ sysalerts_tls_cafile | default('/etc/pki/tls/certs/ca-bundle.crt') }}"
  when: ansible_facts["os_family"] == "RedHat"

- name: Skip unsupported operating systems
  ansible.builtin.meta: end_host
  when: ansible_facts["os_family"] not in ["Debian", "Archlinux", "RedHat"]

- name: Ensure SMTP password is set
  ansible.builtin.assert:
    that:
      - sysalerts_smtp_pass | length > 0
    fail_msg: "sysalerts_smtp_pass is empty; set it in encrypted vars."

- name: Install required packages on Debian
  ansible.builtin.apt:
    name: "{{ sysalerts_required_packages }}"
    state: present
    update_cache: true
  when: ansible_facts["os_family"] == "Debian"

- name: Install required packages on Archlinux
  community.general.pacman:
    name: "{{ sysalerts_required_packages }}"
    state: present
    update_cache: true
  when: ansible_facts["os_family"] == "Archlinux"

- name: Install required packages on RedHat
  ansible.builtin.dnf:
    name: "{{ sysalerts_required_packages }}"
    state: present
    update_cache: true
  when: ansible_facts["os_family"] == "RedHat"

- name: Configure Postfix relay settings
  ansible.builtin.shell: |
    postconf -e "{{ item }}"
  loop:
    - "inet_interfaces = loopback-only"
    - "mydestination = $myhostname, localhost.$mydomain, localhost"
    - "relayhost = [{{ sysalerts_smtp_server }}]:{{ sysalerts_smtp_port }}"
    - "smtp_sasl_auth_enable = yes"
    - "smtp_sasl_password_maps = {{ sysalerts_postfix_map_type }}:/etc/postfix/sasl_passwd"
    - "smtp_sasl_security_options = noanonymous"
    - "smtp_sasl_tls_security_options = noanonymous"
    - "smtp_tls_security_level = encrypt"
    - "smtp_tls_CAfile = {{ sysalerts_tls_cafile }}"
  args:
    executable: /bin/bash
  changed_when: true
  notify: restart postfix

- name: Enable recipient canonical maps
  ansible.builtin.shell: |
    postconf -e "recipient_canonical_maps = regexp:/etc/postfix/recipient_canonical"
  args:
    executable: /bin/bash
  changed_when: true
  when: sysalerts_enable_recipient_rewrite
  notify: restart postfix

- name: Enable header checks
  ansible.builtin.shell: |
    postconf -e "header_checks = pcre:/etc/postfix/header_checks"
  args:
    executable: /bin/bash
  changed_when: true
  when: sysalerts_enable_subject_tagging
  notify: restart postfix

- name: Write SASL password file
  ansible.builtin.template:
    src: sasl_passwd.j2
    dest: /etc/postfix/sasl_passwd
    owner: root
    group: root
    mode: "0600"
  notify:
    - rebuild sasl map
    - restart postfix

- name: Write sender canonical map
  ansible.builtin.template:
    src: sender_canonical.j2
    dest: /etc/postfix/sender_canonical
    owner: root
    group: root
    mode: "0644"
  notify:
    - rebuild sender canonical map
    - restart postfix

- name: Write recipient canonical map
  ansible.builtin.template:
    src: recipient_canonical.j2
    dest: /etc/postfix/recipient_canonical
    owner: root
    group: root
    mode: "0644"
  when: sysalerts_enable_recipient_rewrite
  notify: restart postfix

- name: Write header checks
  ansible.builtin.template:
    src: header_checks.j2
    dest: /etc/postfix/header_checks
    owner: root
    group: root
    mode: "0644"
  when: sysalerts_enable_subject_tagging
  notify: restart postfix

- name: Configure root alias
  ansible.builtin.lineinfile:
    path: /etc/aliases
    regexp: '^root:'
    line: "root: {{ sysalerts_alias_target }}"
    create: true
  notify:
    - run newaliases
    - restart postfix

- name: Apply Postfix container compatibility fixes
  when: ansible_facts["virtualization_type"] in ["lxc", "container", "docker"]
  block:
    - name: Check if Postfix chroot is enabled
      ansible.builtin.shell: |
        awk '
          /^[[:space:]]*#/ {next}
          NF >= 8 && $5 == "y" {print $1}
        ' /etc/postfix/master.cf
      args:
        executable: /bin/bash
      register: postfix_chroot_check
      changed_when: false

    - name: Disable Postfix chroot in containers
      ansible.builtin.shell: |
        awk 'BEGIN{OFS="\t"}
          /^[[:space:]]*#/ || NF < 8 {print; next}
          {$5="n"; print}
        ' /etc/postfix/master.cf > /tmp/master.cf && \
        mv /tmp/master.cf /etc/postfix/master.cf
      args:
        executable: /bin/bash
      when: postfix_chroot_check.stdout != ""
      notify: restart postfix

    - name: Ensure postfix systemd override directory exists
      ansible.builtin.file:
        path: /etc/systemd/system/postfix.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Set postfix systemd override for PrivateDevices
      ansible.builtin.copy:
        dest: /etc/systemd/system/postfix.service.d/override.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [Service]
          PrivateDevices=no
      notify:
        - daemon reload
        - restart postfix

- name: Fix malformed UUCP continuation line in Postfix master.cf
  ansible.builtin.replace:
    path: /etc/postfix/master.cf
    regexp: '^flags=Fqhu'
    replace: '  flags=Fqhu'
  notify: restart postfix

- name: Validate postfix config
  ansible.builtin.command: postfix check
  changed_when: false

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Send test message
  ansible.builtin.shell: |
    echo "Test from {{ ansible_facts['fqdn'] | default(ansible_facts['hostname']) }} at $(date)" | \
    mail -s "{{ sysalerts_test_subject }}" root
  args:
    executable: /bin/bash
  when: sysalerts_send_test | bool
  changed_when: true
