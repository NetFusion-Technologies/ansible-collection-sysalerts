- name: daemon reload
  ansible.builtin.systemd:
    daemon_reload: true

- name: rebuild sasl map
  ansible.builtin.command: "postmap {{ sysalerts_postfix_map_type }}:/etc/postfix/sasl_passwd"

- name: Rebuild sender canonical map
  ansible.builtin.command:
    argv:
      - postmap
      - "{{ sysalerts_postfix_map_type }}:/etc/postfix/sender_canonical"
  changed_when: true

- name: run newaliases
  ansible.builtin.command: newaliases

- name: restart postfix
  ansible.builtin.service:
    name: postfix
    state: restarted
    enabled: true

